name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.1
        required: true
        type: string
      publish_source_release:
        description: Create the source repository release
        required: true
        default: true
        type: boolean
      publish_xposed_release:
        description: Also publish to Xposed-Modules-Repo/org.hdhmc.hyperwallpapermonet
        required: true
        default: false
        type: boolean
      xposed_prerelease:
        description: Mark the Xposed repository release as prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      RELEASE_STORE_FILE: ${{ github.workspace }}/release.jks
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      XPOSED_REPOSITORY: Xposed-Modules-Repo/org.hdhmc.hyperwallpapermonet
      XPOSED_REPO_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
      - name: Validate release version
        run: |
          VERSION_NAME="$(sed -n 's/^appVersionName=//p' gradle.properties)"
          VERSION_CODE="$(sed -n 's/^appVersionCode=//p' gradle.properties)"
          test -n "$VERSION_NAME"
          test -n "$VERSION_CODE"
          test "$VERSION_NAME" = "${{ inputs.version }}"
          if [ "${{ inputs.publish_source_release }}" != "true" ] && [ "${{ inputs.publish_xposed_release }}" != "true" ]; then
            echo "Nothing to publish"
            exit 1
          fi
          TAG_NAME="v$VERSION_NAME"
          XPOSED_TAG_NAME="${VERSION_CODE}-${VERSION_NAME}"
          git fetch --tags --force
          if [ "${{ inputs.publish_source_release }}" = "true" ] && git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists"
            exit 1
          fi
          if [ "${{ inputs.publish_xposed_release }}" = "true" ]; then
            test -n "$XPOSED_REPO_TOKEN"
            if GH_TOKEN="$XPOSED_REPO_TOKEN" gh release view "$XPOSED_TAG_NAME" --repo "$XPOSED_REPOSITORY" >/dev/null 2>&1; then
              echo "Xposed release $XPOSED_TAG_NAME already exists"
              exit 1
            fi
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "XPOSED_TAG_NAME=$XPOSED_TAG_NAME" >> "$GITHUB_ENV"
      - name: Check release signing secrets
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"
      - name: Extract changelog
        run: |
          awk -v version="$VERSION_NAME" '
            $0 ~ "^## \\[" version "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release_notes.md
          test -s release_notes.md
      - name: Restore release keystore
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RELEASE_STORE_FILE"
      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon
      - name: Prepare release artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/HyperWallpaperMonet-${VERSION_NAME}.apk"
      - name: Verify APK signature
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --print-certs "dist/HyperWallpaperMonet-${VERSION_NAME}.apk"
      - name: Prepare Xposed release artifact
        if: ${{ inputs.publish_xposed_release }}
        run: |
          mkdir -p dist-xposed
          cp "dist/HyperWallpaperMonet-${VERSION_NAME}.apk" "dist-xposed/HyperWallpaperMonet-${VERSION_NAME}.apk"
      - name: Verify Xposed APK metadata and signature
        if: ${{ inputs.publish_xposed_release }}
        run: |
          AAPT="$(find "$ANDROID_HOME/build-tools" -name aapt2 | sort -V | tail -n 1)"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)"
          test -x "$AAPT"
          test -x "$APKSIGNER"
          BADGING="$("$AAPT" dump badging "dist-xposed/HyperWallpaperMonet-${VERSION_NAME}.apk" | head -n 1)"
          echo "$BADGING"
          echo "$BADGING" | grep "name='org.hdhmc.hyperwallpapermonet'"
          echo "$BADGING" | grep "versionCode='$VERSION_CODE'"
          echo "$BADGING" | grep "versionName='$VERSION_NAME'"
          "$APKSIGNER" verify --print-certs "dist-xposed/HyperWallpaperMonet-${VERSION_NAME}.apk"
      - name: Generate Xposed release notes
        if: ${{ inputs.publish_xposed_release }}
        run: |
          {
            echo "### APK 选择"
            echo
            echo "- \`HyperWallpaperMonet-${VERSION_NAME}.apk\`: 用于 LSPosed v2.1.0(7769) 及以上，或兼容 libxposed API 102 的框架。"
            echo
            echo "### 更新内容"
            cat release_notes.md
            echo
            echo "Source: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          } > xposed_release_notes.md
      - name: Sync Xposed repository metadata
        if: ${{ inputs.publish_xposed_release }}
        env:
          GH_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
        run: |
          if ! gh api "repos/$XPOSED_REPOSITORY" >/dev/null; then
            echo "Cannot access $XPOSED_REPOSITORY with XPOSED_REPO_TOKEN"
            exit 1
          fi

          temp_dir="$(mktemp -d)"
          if gh api "repos/$XPOSED_REPOSITORY/branches/main" >/dev/null 2>&1; then
            git clone --depth 1 --branch main "https://github.com/$XPOSED_REPOSITORY.git" "$temp_dir"
          else
            git -C "$temp_dir" init -b main
            git -C "$temp_dir" remote add origin "https://github.com/$XPOSED_REPOSITORY.git"
          fi
          git -C "$temp_dir" config user.name "github-actions[bot]"
          git -C "$temp_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cp README.md "$temp_dir/README.md"
          cp README.en.md "$temp_dir/README.en.md"
          printf '["com.android.systemui"]\n' > "$temp_dir/SCOPE"
          printf 'https://github.com/${{ github.repository }}\n' > "$temp_dir/SOURCE_URL"
          printf '修复 HyperOS 3 SystemUI 壁纸取色 / Monet 动态主题色不刷新的问题。\n' > "$temp_dir/SUMMARY"

          git -C "$temp_dir" add README.md README.en.md SCOPE SOURCE_URL SUMMARY
          if git -C "$temp_dir" diff --cached --quiet; then
            echo "Xposed repository metadata is already up to date"
            exit 0
          fi
          git -C "$temp_dir" commit -m "Update module metadata"
          git -C "$temp_dir" -c http.extraheader="AUTHORIZATION: bearer $GH_TOKEN" push origin main
      - name: Create and push tag
        if: ${{ inputs.publish_source_release }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"
      - name: Create GitHub release
        if: ${{ inputs.publish_source_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: HyperWallpaperMonet ${{ env.VERSION_NAME }}
          body_path: release_notes.md
          files: dist/*.apk
      - name: Create Xposed repository release
        if: ${{ inputs.publish_xposed_release }}
        env:
          GH_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
        run: |
          PRERELEASE_ARGS=()
          if [ "${{ inputs.xposed_prerelease }}" = "true" ]; then
            PRERELEASE_ARGS+=(--prerelease)
          fi
          gh release create "$XPOSED_TAG_NAME" dist-xposed/*.apk \
            --repo "$XPOSED_REPOSITORY" \
            --target main \
            --title "$VERSION_NAME" \
            --notes-file xposed_release_notes.md \
            "${PRERELEASE_ARGS[@]}"
