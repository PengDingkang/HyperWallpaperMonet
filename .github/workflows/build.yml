name: CI

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
      - name: Read version
        run: |
          VERSION_NAME="$(sed -n 's/^appVersionName=//p' gradle.properties)"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Prepare debug artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/HyperWallpaperMonet-${VERSION_NAME}-debug.apk"
      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: HyperWallpaperMonet-debug
          path: dist/*.apk
